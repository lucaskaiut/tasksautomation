services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tasksautomation-app
    entrypoint: ["/bin/sh", "/var/www/html/.docker/app/entrypoint.sh"]
    command: ["php-fpm"]
    user: "0:0"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      TASKS_REALTIME_BRIDGE_HOST: websocket
    depends_on:
      - db

  websocket:
    image: tasksautomation-app
    entrypoint: ["/bin/sh", "/var/www/html/.docker/app/entrypoint.sh"]
    command: ["php", "artisan", "tasks:websocket", "--host=0.0.0.0", "--bridge-host=0.0.0.0"]
    user: "0:0"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      TASKS_REALTIME_BRIDGE_HOST: 0.0.0.0
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - websocket

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: tasksautomation
      MYSQL_USER: tasksautomation
      MYSQL_PASSWORD: tasksautomation
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    command: ["sh", "-lc", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules

volumes:
  dbdata:
  vendor:
  node_modules:
